name: Build & Release

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:
    inputs:
      publish_release:
        description: "Create or update GitHub release after successful builds"
        required: false
        default: false
        type: boolean

permissions:
  contents: write

jobs:
  get-version:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
      version_plain: ${{ steps.version.outputs.version_plain }}
      tag_exists: ${{ steps.tag.outputs.exists }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - id: version
        shell: bash
        run: |
          V=$(grep -oP 'return "\K[0-9]+\.[0-9]+\.[0-9]+' src/utils/version.h | head -1)
          if [ -z "$V" ]; then
            echo "Cannot extract version from src/utils/version.h" >&2
            exit 1
          fi
          echo "version=v${V}" >> "$GITHUB_OUTPUT"
          echo "version_plain=${V}" >> "$GITHUB_OUTPUT"

      - id: tag
        shell: bash
        run: |
          if git rev-parse "${{ steps.version.outputs.version }}" >/dev/null 2>&1; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

  verify-version:
    needs: get-version
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check resource version consistency
        shell: bash
        run: |
          EXPECTED="${{ needs.get-version.outputs.version_plain }}"
          EXPECTED_RC="${EXPECTED//./,},0"
          EXPECTED_STR="${EXPECTED}.0"

          FILE_RC=$(grep -oP '^FILEVERSION\s+\K[0-9,]+' res/resource.rc | head -1)
          PROD_RC=$(grep -oP '^PRODUCTVERSION\s+\K[0-9,]+' res/resource.rc | head -1)
          FILE_STR=$(grep -oP 'VALUE "FileVersion",\s+"\K[0-9.]+' res/resource.rc | head -1)
          PROD_STR=$(grep -oP 'VALUE "ProductVersion",\s+"\K[0-9.]+' res/resource.rc | head -1)

          test "$FILE_RC" = "$EXPECTED_RC"
          test "$PROD_RC" = "$EXPECTED_RC"
          test "$FILE_STR" = "$EXPECTED_STR"
          test "$PROD_STR" = "$EXPECTED_STR"

  build-all:
    needs: [get-version, verify-version]
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: x86
            msvc_arch: x86
            runner: windows-latest
            sdk: 10.0.26100.0
          - arch: x64
            msvc_arch: x64
            runner: windows-latest
            sdk: 10.0.26100.0
          - arch: arm
            msvc_arch: amd64_arm
            runner: windows-2022
            sdk: 10.0.22621.0
          - arch: arm64
            msvc_arch: amd64_arm64
            runner: windows-latest
            sdk: 10.0.26100.0
    steps:
      - uses: actions/checkout@v4

      - name: Locate Visual Studio
        uses: microsoft/setup-msbuild@v2

      - name: Set up MSVC developer command prompt
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: ${{ matrix.msvc_arch }}
          sdk: ${{ matrix.sdk }}

      - name: Build executable
        shell: cmd
        run: nmake /NOLOGO /F Makefile.msvc ARCH=${{ matrix.arch }} single-build

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: MikaBooM-${{ matrix.arch }}
          path: |
            MikaBooM_${{ matrix.arch }}.exe
          if-no-files-found: error

  build-legacy-x86:
    needs: [get-version, verify-version]
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install MSYS2 mingw32 toolchain (msvcrt)
        id: msys2
        uses: msys2/setup-msys2@v2
        with:
          msystem: MINGW32
          update: false
          install: >-
            mingw-w64-i686-gcc
            mingw-w64-i686-binutils

      - name: Verify mingw32 toolchain
        shell: cmd
        env:
          MSYS2_LOCATION: ${{ steps.msys2.outputs.msys2-location }}
        run: |
          set "LEGACY_MINGW_BIN=%MSYS2_LOCATION%\mingw32\bin"
          set "LEGACY_MSYS_BIN=%MSYS2_LOCATION%\usr\bin"
          set "PATH=%LEGACY_MINGW_BIN%;%LEGACY_MSYS_BIN%;%PATH%"
          if not exist "%LEGACY_MINGW_BIN%\g++.exe" exit /b 1
          if not exist "%LEGACY_MINGW_BIN%\windres.exe" exit /b 1
          if not exist "%LEGACY_MSYS_BIN%\make.exe" exit /b 1
          where g++
          where windres
          where make
          echo MSYS2 location: %MSYS2_LOCATION%
          echo Selected g++: %LEGACY_MINGW_BIN%\g++.exe
          echo Selected windres: %LEGACY_MINGW_BIN%\windres.exe
          echo Selected make: %LEGACY_MSYS_BIN%\make.exe
          for /f %%i in ('"%LEGACY_MINGW_BIN%\g++.exe" -dumpmachine') do set GCC_TARGET=%%i
          echo GCC target: %GCC_TARGET%
          if /I not "%GCC_TARGET%"=="i686-w64-mingw32" exit /b 1

      - name: Build legacy x86 executable
        shell: cmd
        env:
          MSYS2_LOCATION: ${{ steps.msys2.outputs.msys2-location }}
        run: |
          set "LEGACY_MINGW_BIN=%MSYS2_LOCATION%\mingw32\bin"
          set "LEGACY_MSYS_BIN=%MSYS2_LOCATION%\usr\bin"
          set "PATH=%LEGACY_MINGW_BIN%;%LEGACY_MSYS_BIN%;%PATH%"
          "%LEGACY_MSYS_BIN%\make.exe" legacy-x86

      - name: Audit legacy x86 imports
        shell: cmd
        env:
          MSYS2_LOCATION: ${{ steps.msys2.outputs.msys2-location }}
        run: |
          set "LEGACY_MINGW_BIN=%MSYS2_LOCATION%\mingw32\bin"
          set "LEGACY_MSYS_BIN=%MSYS2_LOCATION%\usr\bin"
          set "PATH=%LEGACY_MINGW_BIN%;%LEGACY_MSYS_BIN%;%PATH%"
          "%LEGACY_MSYS_BIN%\make.exe" check-imports

      - name: Upload legacy x86 artifact
        uses: actions/upload-artifact@v4
        with:
          name: MikaBooM-x86-win2000
          path: |
            MikaBooM_x86_win2000.exe
          if-no-files-found: error

  publish:
    needs: [get-version, build-all, build-legacy-x86]
    if: |
      always() &&
      needs.get-version.result == 'success' &&
      needs.build-all.result == 'success' &&
      needs.build-legacy-x86.result == 'success' &&
      ((github.event_name == 'workflow_dispatch' && inputs.publish_release) ||
      (github.event_name == 'push' && needs.get-version.outputs.tag_exists == 'false'))
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          path: release
          merge-multiple: true

      - name: List release files
        shell: bash
        run: ls -lah release

      - name: Generate release notes
        id: notes
        shell: bash
        run: |
          PREV=$(git describe --tags --abbrev=0 2>/dev/null || echo "")
          if [ -z "$PREV" ]; then
            COMMITS=$(git log --oneline --pretty=format:"- %s (%h)" | head -50)
          else
            COMMITS=$(git log ${PREV}..HEAD --oneline --pretty=format:"- %s (%h)")
          fi

          shopt -s nullglob
          EXES=(release/*.exe)
          if [ ${#EXES[@]} -eq 0 ]; then
            echo "No executable assets found in release/" >&2
            exit 1
          fi

          {
            echo 'BODY<<EOF'
            echo '## Summary'
            echo
            echo "$COMMITS"
            echo
            echo '## Packages'
            echo
            echo '| File | Architecture | Target |'
            echo '| --- | --- | --- |'
            for file in "${EXES[@]}"; do
              base=$(basename "$file")
              case "$base" in
                *_x86_win2000*) echo "| \`$base\` | x86 | Windows 2000 / XP / 2003 (legacy) |" ;;
                *_x86*)         echo "| \`$base\` | x86 | modern x86 (minimum OS depends on toolchain validation) |" ;;
                *_x64*)         echo "| \`$base\` | x64 | modern x64 |" ;;
                *_arm.*)        echo "| \`$base\` | ARM | Windows RT / 10 ARM |" ;;
                *_arm64*)       echo "| \`$base\` | ARM64 | Windows 10/11 ARM64 |" ;;
                *)              echo "| \`$base\` | - | - |" ;;
              esac
            done
            echo
            echo '> Modern MSVC builds no longer claim Windows 2000 compatibility. Windows 2000 / XP / 2003 support is provided only by the separate legacy x86 artifact after import auditing.'
            echo 'EOF'
          } >> "$GITHUB_OUTPUT"

      - name: Create or update release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.get-version.outputs.version }}
          name: Release ${{ needs.get-version.outputs.version }}
          body: ${{ steps.notes.outputs.BODY }}
          files: release/*.exe
          make_latest: true
